# Netlify config for ResumeAI frontend
# Replace YOUR_RENDER_BACKEND_URL below with your actual Render backend URL (e.g. https://resumeai-backend.onrender.com)

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy /api/* to your backend (update the URL after deploying backend to Render)
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_RENDER_BACKEND_URL/api/:splat"
  status = 200
  force = true
